name: Release

on:
  push:
    tags:
      - "v*.*.*"          # trigger hanya saat push tag seperti v1.0.0

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests (wajib hijau sebelum publish)
        run: uv run pytest --cov=polarsmith

      - name: Build package
        run: uv build

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build                    # harus build sukses dulu
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/polarsmith/

    permissions:
      id-token: write               # WAJIB untuk OIDC — inilah kuncinya

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Tidak perlu username, password, atau token sama sekali
        # OIDC handle otomatis